<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>META MASTER LEAGUE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            max-height: 850px;
            background: #000000;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            border: 1px solid #222;
        }

        .top-gradient {
            background-image: url('https://i.pinimg.com/1200x/60/72/93/6072937813a0135c6fb275a7b62ad52c.jpg');
            background-size: cover;
            background-position: center;
            height: 250px;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            padding: 50px 25px 25px 25px;
        }

        .card-bg-img {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }
        
        .card-overlay {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 20px;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            padding: 1rem 1.5rem;
        }

        .transaction-card {
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
            margin-bottom: 16px;
            height: 90px;
            overflow: hidden;
            display: block;
            text-decoration: none;
        }

        .neon-red:hover { box-shadow: 0 0 20px rgba(239, 68, 68, 0.6); transform: translateY(-2px); }
        .neon-blue:hover { box-shadow: 0 0 20px rgba(59, 130, 246, 0.6); transform: translateY(-2px); }
        .neon-green:hover { box-shadow: 0 0 20px rgba(14, 115, 237, 0.6); transform: translateY(-2px); }
        .neon-purple:hover { box-shadow: 0 0 20px rgba(168, 85, 247, 0.6); transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="top-gradient"></div>

    <div class="flex-1 p-6 text-white overflow-y-auto">
        <h2 class="text-xl font-semibold mb-6">MASTER LEAGUE |  World CUP</h2>

        <!-- Player Lists -->
        <a href="https://shelbyzio.github.io/MetaMaster_League/" target="_blank" class="transaction-card neon-red card-bg-img" style="background-image: url('https://i.pinimg.com/736x/13/83/48/138348b7148a33428087aeae26cb32f7.jpg');">
            <div class="card-overlay">
                <div class="flex-1">
                    <p class="font-bold text-white text-lg">Player Lists</p>
                    <p class="text-xs text-gray-400">အသေးစိတ်ကိုဝင်ကြည့်ပါ</p>
                </div>
            </div>
        </a>

        <!-- Match Fixtures -->
        <a href="https://shelbyzio.github.io/Matster_Roundof16/" target="_blank" class="transaction-card neon-green card-bg-img" style="background-image: url('https://i.pinimg.com/1200x/ae/f7/33/aef7331e4a1fe857449480e87030ceb3.jpg');">
            <div class="card-overlay">
                <div class="flex-1">
                    <p class="font-bold text-white text-lg">Match Fixtures</p>
                    <p class="text-xs text-gray-400">အသေးစိတ်ကိုဝင်ကြည့်ပါ</p>
                </div>
            </div>
        </a>

        <!-- Send Result -->
        <a href="https://t.me/han_xoxo3" target="_blank" class="transaction-card neon-blue card-bg-img" style="background-image: url('https://i.pinimg.com/1200x/b5/12/1f/b5121f6270ce182fa03c961b4ea89e95.jpg');">
            <div class="card-overlay">
                <div class="flex-1">
                    <p class="font-bold text-white text-lg">Send Result Here!</p>
                    <p class="text-xs text-gray-400">ပွဲရလဒ်များကိုဒီမှာပို့ပေးပါ</p>
                </div>
            </div>
        </a>

       

    </div>
</div>

</body>
</html>
